name: Python Unit Tests

#mikor induljon el
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

#mit csinaljon
jobs:
  test:
    #oprendszer
    runs-on: ubuntu-latest

    steps:
    #kod letoltese a felhos gepre
    - name: Checkout repository
      uses: actions/checkout@v4

    #feltelepiti a pythont
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    #feltelepiti a pytestet
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    #lefuttatja a teszteket
    - name: Run Pytest
      run: |
        pytest -v
        # trigger workflow
